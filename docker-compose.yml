services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: nontonbola:latest
    container_name: nontonbola
    restart: unless-stopped
    # Published on localhost ONLY — put your nginx reverse proxy in front of this.
    # Override the host port with APP_PORT (e.g. `APP_PORT=40000 docker compose up -d`).
    ports:
      - "127.0.0.1:${APP_PORT:-39127}:3000"
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
